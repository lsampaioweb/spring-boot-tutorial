spring:
  datasource:
    url: "jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE"
    driver-class-name: "org.h2.Driver"
    username: "sa"
    password: ""
  sql:
    init:
      mode: "always"
      schema-locations: "classpath:sql/db/schema.sql"

server:
  error:
    include-stacktrace: "never"

app:
  security:
    user:
      username: "testuser"
      password: "testpassword"
