spring:
  application:
    name: "actuator"

# Add if you want to have a username and password for the actuator endpoint.
  # security:
  #   user:
  #     name: "${USERNAME}"
  #     password: "${PASSWORD}"

management:
  endpoints:
    web:
      exposure:
        # include: "*"
        include: "health,info"

  endpoint:
    health:
      show-details: "when-authorized"

logging:
  config: "classpath:log/logback-spring.xml"
