---
networks:
  tutorial-network:
    external: true

services:
  vault:
    image: "hashicorp/vault:latest"
    # Pinned example: image: "hashicorp/vault:1.20"
    # Docs: https://hub.docker.com/r/hashicorp/vault
    container_name: "tutorial-vault"
    restart: "unless-stopped"
    cap_drop:
      - "ALL"
    security_opt:
      - "no-new-privileges:true"
    ports:
      - "8200:8200"
    environment:
      - "VAULT_DEV_ROOT_TOKEN_ID=tutorial-root-token"
      - "VAULT_DEV_LISTEN_ADDRESS=0.0.0.0:8200"
      - "VAULT_ADDR=http://127.0.0.1:8200"
    networks:
      - "tutorial-network"
    command: "server -dev"
    cap_add:
      - "IPC_LOCK"
    volumes:
      - "./volumes/file:/vault/file"
      - "./volumes/logs:/vault/logs"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:8200/v1/sys/health >/dev/null || exit 1"]
      start_period: "15s"
      interval: "10s"
      timeout: "5s"
      retries: 10
