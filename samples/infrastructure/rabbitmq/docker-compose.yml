---
networks:
  tutorial-network:
    external: true

services:
  rabbitmq:
    image: "rabbitmq:latest"
    # Pinned example: image: "rabbitmq:4.2-management-alpine"
    # Docs: https://hub.docker.com/_/rabbitmq
    container_name: "tutorial-rabbitmq"
    restart: "unless-stopped"
    cap_drop:
      - "ALL"
    security_opt:
      - "no-new-privileges:true"
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - "RABBITMQ_DEFAULT_USER=admin"
      - "RABBITMQ_DEFAULT_PASS=admin"
    networks:
      - "tutorial-network"
    volumes:
      - "./volumes:/var/lib/rabbitmq"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      start_period: "15s"
      interval: "10s"
      timeout: "5s"
      retries: 10
