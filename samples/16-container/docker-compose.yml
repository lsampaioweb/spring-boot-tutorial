---
networks:
  spring-boot-container-network:
    external: true

services:
  spring-boot-container:
    image: "docker.io/lsampaioweb/spring-boot-container:1.0"
    # image: "docker.io/lsampaioweb/spring-boot-container:1.1"
    # image: "docker.io/lsampaioweb/spring-boot-container:latest"
    container_name: "spring-boot-container"
    restart: "unless-stopped"
    # Keep the container filesystem read-only for better runtime security.
    read_only: true
    # Drop all Linux capabilities to reduce the attack surface.
    cap_drop:
      - "ALL"
    # Prevent privilege escalation inside the container.
    security_opt:
      - "no-new-privileges:true"
    # Use a small in-memory /tmp with safer mount options.
    tmpfs:
      - "/tmp:rw,noexec,nosuid,size=64m"
    ports:
      - "8080:8080"
      # - "9443:9443"
      # - "8080:80"
      # - "9443:443"
    volumes:
      - "./logs/container:/opt/app/logs"
      - "./ssl/:/opt/app/ssl/:ro"
    networks:
      - "spring-boot-container-network"
    logging:
      driver: "k8s-file"
    environment:
      - "SPRING_PROFILES_ACTIVE=development"
      # - "SPRING_PROFILES_ACTIVE=production"
      # - "SERVER_PORT=9443"
      # - "SSL_CERT_PATH=./ssl/app.cer"
      # - "SSL_KEY_PATH=./ssl/app.key"
      - "JAVA_TOOL_OPTIONS=-Xms512m -Xmx1024m"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O- http://localhost:8080/actuator/health/liveness || exit 1",
        ]
      # test: ["CMD-SHELL", "wget --no-check-certificate -q -O- https://localhost:9443/actuator/health/liveness || exit 1"]
      start_period: "2s"
      interval: "10s"
      timeout: "2s"
      retries: 2
