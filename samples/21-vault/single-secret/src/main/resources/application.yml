spring:
  application:
    name: "vault"

  profiles:
    active:
      # - "development"
      - "production"

  messages:
    basename: "i18n/messages"
    encoding: "UTF-8"
    default-locale: "en"
    fallback-to-system-locale: false

  threads:
    virtual:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: "health,info"
  endpoint:
    health:
      show-details: "when-authorized"
      probes:
        enabled: true

server:
  port: 8091
  error:
    include-stacktrace: "never"

logging:
  config: "classpath:log/logback-spring.xml"

app:
  logging:
    path: "logs"

  vault:
    uri: "${VAULT_URI:http://localhost:8200}"
    token: "${VAULT_TOKEN}"
    http:
      connect-timeout-ms: "${VAULT_HTTP_CONNECT_TIMEOUT_MS:2000}"
      read-timeout-ms: "${VAULT_HTTP_READ_TIMEOUT_MS:5000}"
    mount-path: "${VAULT_MOUNT_PATH:secret}"
    read-path-template: "${VAULT_READ_PATH_TEMPLATE:/v1/%s/data/%s}"
    secrets:
      - path: "spring-boot-tutorial"
        key: "api-secret"
      - path: "spring-boot-tutorial"
        key: "db-password"
